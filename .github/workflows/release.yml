name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Package
        run: cd dist && zip ../obsidian-ai-assistant-${{ github.ref_name }}.zip main.js manifest.json styles.css

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: obsidian-ai-assistant-${{ github.ref_name }}.zip
